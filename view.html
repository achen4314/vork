<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>裁判报名数据</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f6fa;padding:16px}
h1{font-size:20px;margin-bottom:4px;color:#1a1a2e}
.sub{color:#999;font-size:12px;margin-bottom:16px}
.cards{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.cards>div{background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 1px 3px rgba(0,0,0,.06);min-width:100px}
.cards .n{font-size:26px;font-weight:700;color:#e94560}
.cards .l{font-size:11px;color:#999;margin-top:2px}
.bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.bar button{padding:7px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:none;font-weight:600}
.btn1{background:#e94560;color:#fff}
.btn2{background:#fff;color:#e94560;border:1.5px solid #e94560}
.wrap{background:#fff;border-radius:10px;overflow:auto;max-height:500px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid #f0f0f0;white-space:nowrap}
th{background:#1a1a2e;color:#fff;position:sticky;top:0}
tr:hover td{background:#fafafa}
#status{text-align:center;padding:40px;color:#999}
#error{display:none;text-align:center;padding:40px;color:#d32f2f}
</style>
</head>
<body>
<h1>📋 裁判报名数据</h1>
<p class="sub">数据来源：云端 · <span id="time"></span> · <span id="count"></span></p>

<div class="cards">
  <div><div class="n" id="total">-</div><div class="l">报名总数</div></div>
  <div><div class="n" id="schools">-</div><div class="l">参与学校</div></div>
</div>

<div class="bar">
  <button class="btn1" onclick="loadData()">🔄 刷新数据</button>
  <button class="btn2" onclick="exportCSV()">📥 导出CSV</button>
  <button class="btn2" onclick="window.open('/')">📱 打开报名表</button>
</div>

<div id="status">加载中...</div>
<div id="error"></div>
<div id="tableWrap" class="wrap" style="display:none"></div>

<script>
var API = 'https://api.github.com/repos/achen4314/vork/contents/data.json';
var ALL_DATA = [];

// UTF-8 safe base64 decode
function b64d(s) {
  return decodeURIComponent(atob(s).split('').map(function(c){return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)}).join(''));
}

var FIELDS = [
  {k:'t',l:'提交时间'},{k:'n',l:'姓名'},{k:'g',l:'性别'},
  {k:'id',l:'身份证号'},{k:'ph',l:'手机号'},{k:'wx',l:'微信号'},
  {k:'sc',l:'学校'},{k:'dp',l:'学院/部门'},{k:'rl',l:'身份'},
  {k:'ex',l:'裁判经验'},{k:'ed',l:'裁判经历'},{k:'tr',l:'参加培训'},
  {k:'p1',l:'第一志愿'},{k:'p2',l:'第二志愿'},{k:'sz',l:'尺码'},
  {k:'dt',l:'饮食'},{k:'en',l:'紧急联系人'},{k:'ep',l:'紧急电话'},
  {k:'er',l:'关系'},{k:'rm',l:'备注'}
];

function loadData() {
  document.getElementById('status').style.display = 'block';
  document.getElementById('status').textContent = '加载中...';
  document.getElementById('error').style.display = 'none';
  document.getElementById('tableWrap').style.display = 'none';

  fetch(API, {headers:{'Accept':'application/vnd.github+json'}})
  .then(function(r){
    if (!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  })
  .then(function(d){
    ALL_DATA = JSON.parse(b64d(d.content));
    if (!Array.isArray(ALL_DATA)) ALL_DATA = [];
    document.getElementById('status').style.display = 'none';
    document.getElementById('time').textContent = new Date().toLocaleString('zh-CN');
    document.getElementById('count').textContent = '共 '+ALL_DATA.length+' 条';

    if (!ALL_DATA.length) {
      document.getElementById('status').textContent = '暂无报名数据';
      document.getElementById('status').style.display = 'block';
      return;
    }

    document.getElementById('total').textContent = ALL_DATA.length;
    var schools = new Set();
    ALL_DATA.forEach(function(r){ if (r.sc) schools.add(r.sc); });
    document.getElementById('schools').textContent = schools.size;

    var html = '<table><thead><tr><th>#</th>';
    FIELDS.forEach(function(f){ html += '<th>'+f.l+'</th>'; });
    html += '</tr></thead><tbody>';

    for (var i=0;i<ALL_DATA.length;i++) {
      html += '<tr><td>'+(i+1)+'</td>';
      FIELDS.forEach(function(f){ html += '<td>'+(ALL_DATA[i][f.k]||'')+'</td>'; });
      html += '</tr>';
    }
    html += '</tbody></table>';
    document.getElementById('tableWrap').innerHTML = html;
    document.getElementById('tableWrap').style.display = 'block';
  })
  .catch(function(e){
    document.getElementById('status').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = '加载失败：'+e.message;
  });
}

function exportCSV() {
  if (!ALL_DATA.length) return alert('无数据');
  var h = FIELDS.map(function(f){return f.l}).join(',');
  var csv = '\uFEFF'+h+'\n';
  ALL_DATA.forEach(function(r){
    csv += FIELDS.map(function(f){return '"'+(r[f.k]||'').replace(/"/g,'""')+'"'}).join(',')+'\n';
  });
  var blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href = url; a.download = '裁判报名汇总_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
}

loadData();
</script>
</body>
</html>
